services:
  db:
    image: postgres:16-alpine
    restart: unless-stopped
    environment:
      POSTGRES_DB: ai_medical_project
      POSTGRES_USER: ai_medical_user
      POSTGRES_PASSWORD: change-me
    volumes:
      - postgres_data:/var/lib/postgresql/data

  web:
    build:
      context: .
    restart: unless-stopped
    depends_on:
      - db
    env_file:
      - .env
    environment:
      DJANGO_DEBUG: "false"
      DATABASE_URL: postgresql://ai_medical_user:change-me@db:5432/ai_medical_project
      DJANGO_ALLOWED_HOSTS: localhost,127.0.0.1
      DJANGO_CSRF_TRUSTED_ORIGINS: http://localhost,http://127.0.0.1
      DJANGO_SERVE_MEDIA: "true"
      DJANGO_STATIC_ROOT: /app/staticfiles
      DJANGO_MEDIA_ROOT: /app/media
    command: /bin/sh -c "python manage.py collectstatic --noinput && python manage.py migrate --noinput && python manage.py configure_site && python manage.py bootstrap_defaults && gunicorn ai_medical_project.wsgi:application --bind 0.0.0.0:8000 --workers $${GUNICORN_WORKERS:-3} --timeout $${GUNICORN_TIMEOUT:-180}"
    ports:
      - "8000:8000"
    volumes:
      - media_data:/app/media
      - model_artifacts:/app/medical_app/ml_models

  worker:
    build:
      context: .
    restart: unless-stopped
    depends_on:
      - db
    env_file:
      - .env
    environment:
      DJANGO_DEBUG: "false"
      DATABASE_URL: postgresql://ai_medical_user:change-me@db:5432/ai_medical_project
      DJANGO_MEDIA_ROOT: /app/media
    command: /bin/sh -c "python manage.py migrate --noinput && python manage.py configure_site && python manage.py run_training_worker --continuous --poll-seconds $${TRAINING_WORKER_POLL_SECONDS:-15}"
    volumes:
      - media_data:/app/media
      - model_artifacts:/app/medical_app/ml_models

volumes:
  postgres_data:
  media_data:
  model_artifacts:
